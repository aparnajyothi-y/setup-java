name: Basic validation

on:
  push:
    branches:
      - main
      - releases/*
      - rate-limit-java
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  call-basic-validation:
    name: Basic validation
    uses: aparnajyothi-y/reusable-workflows/.github/workflows/basic-validation.yml@rate-limit-java
    with:
      node-version: '20.x'
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
